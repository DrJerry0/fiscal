<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정부 AI 예산 분석 플랫폼</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h1>정부부처 AI 정책 예산 분석</h1>
    <nav>
        <a href="#overview">개요</a>
        <a href="#ministry">부처별</a>
        <a href="#domain">분야별</a>
        <a href="#similarity">유사성</a>
        <a href="#cluster">클러스터</a>
        <a href="#insight">인사이트</a>
        <a href="#ai">AI기술</a>
    </nav>
</header>

<main>

<section id="overview">
    <h2>개요</h2>
    <canvas id="keywordChart"></canvas>
</section>

<section id="ministry">
    <h2>부처별 분석</h2>
    <div id="ministry-chart"></div>
</section>

<section id="domain">
    <h2>분야별 분석</h2>
    <div id="domain-chart"></div>
</section>

<section id="similarity">
    <h2>유사성 분석</h2>
    <div id="similarity-chart"></div>
</section>

<section id="cluster">
    <h2>정책 클러스터</h2>
    <div id="cluster-chart"></div>
</section>

<section id="insight">
    <h2>예산 인사이트</h2>
    <div id="insight-chart"></div>
</section>

<section id="ai">
    <h2>AI 기술 분석</h2>
    <div id="ai-chart"></div>
</section>

</main>

<script src="assets/js/app.js"></script>

</body>
</html>
